name: Build and Release APK

on:
  push:
    branches: [ main ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle*'
      - 'gradle.properties'
      - 'gradle/**'
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建 Release 和上传资源

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v3
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build APK
      run: ./gradlew assembleRelease
      env:
        RELEASE_STORE_FILE: keystore/release.keystore
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/
        retention-days: 30
    
    - name: Get version info
      id: version
      run: |
        VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | head -1 | awk -F '= ' '{print $2}' | tr -d ' ')
        VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -1 | awk -F '= "' '{print $2}' | tr -d '"')
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
    
    - name: Generate Changelog
      id: changelog
      run: |
        # 获取上一个 Release Tag
        PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')
        CURRENT_TAG="v${{ steps.version.outputs.version_name }}"

        # 根据是否存在上一个 Tag 决定变更范围
        if [ -n "$PREVIOUS_TAG" ]; then
          COMMITS=$(git log --oneline ${PREVIOUS_TAG}..HEAD --no-merges)
          CHANGE_RANGE="${PREVIOUS_TAG} → ${CURRENT_TAG}"
        else
          COMMITS=$(git log --oneline --no-merges)
          CHANGE_RANGE="首次发布"
        fi

        BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
        SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

        # 生成变更日志
        cat > release_notes.md << EOF
        ## 📱 MZAI Release Notes

        **版本**: v${{ steps.version.outputs.version_name }}
        **构建时间**: $BUILD_TIME
        **提交**: [$SHORT_SHA](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
        **变更范围**: ${CHANGE_RANGE}

        ### 📝 变更内容

        $COMMITS

        ---
        *此版本由 CI/CD 自动构建发布*
        EOF

        echo "changelog_generated=true" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk \
          app/build/outputs/apk/release/XMZAI-v${{ steps.version.outputs.version_name }}.apk

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: Release v${{ steps.version.outputs.version_name }}
        body_path: release_notes.md
        generate_release_notes: false
        files: app/build/outputs/apk/release/XMZAI-v${{ steps.version.outputs.version_name }}.apk
        draft: false
        prerelease: false